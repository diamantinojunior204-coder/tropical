<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Depósito PIX</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}

.container {
    margin-top: 50px;
}

input {
    padding: 10px;
    width: 200px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

#qr {
    margin-top: 20px;
    width: 250px;
}

#codigo {
    background: #1e293b;
    padding: 10px;
    margin-top: 10px;
    word-break: break-all;
    border-radius: 5px;
}

.loader {
    margin-top: 20px;
    display: none;
}
</style>

</head>
<body>

<div class="container">

    <h1>💳 Depósito via PIX</h1>

    <input type="number" id="valor" placeholder="Digite o valor" />

    <br><br>

    <button onclick="gerarPix()">Gerar PIX</button>

    <div class="loader" id="loading">
        ⏳ Gerando pagamento...
    </div>

    <img id="qr" />

    <div id="codigo"></div>

</div>

<script>
async function gerarPix() {

    let valor = document.getElementById("valor").value;

    if (!valor || valor <= 0) {
        alert("Digite um valor válido");
        return;
    }

    document.getElementById("loading").style.display = "block";

    try {
        let res = await fetch("/criar_pix", {
            method: "POST",
            body: new URLSearchParams({valor})
        });

        let data = await res.json();

        console.log(data);

        if (data.erro) {
            alert("Erro: " + data.erro);
            document.getElementById("loading").style.display = "none";
            return;
        }

        document.getElementById("qr").src =
            "data:image/png;base64," + data.qr_base64;

        document.getElementById("codigo").innerText = data.qr_code;

        document.getElementById("loading").innerText =
            "⏳ Aguardando pagamento...";

        let interval = setInterval(async () => {

            let r = await fetch("/status_pix/" + data.payment_id);
            let s = await r.json();

            if (s.status === "pago") {
                clearInterval(interval);
                alert("✅ Pagamento confirmado!");
                location.reload();
            }

        }, 3000);

    } catch (e) {
        alert("Erro ao conectar com servidor");
        console.log(e);
    }
}
console.log("PAYMENT ID:", data.payment_id);
</script>

</body>
</html>
