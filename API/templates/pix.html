<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depósito PIX</title><style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#020617;
    padding:35px;
    border-radius:15px;
    text-align:center;
    width:90%;
    max-width:420px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
    margin-bottom:20px;
    font-size:28px;
    color:#22c55e;
}

.valor{
    font-size:18px;
    margin-bottom:20px;
}

.chave{
    background:#0f172a;
    padding:12px;
    border-radius:8px;
    margin:15px 0;
    font-size:18px;
    word-break:break-all;
}

.qr{
    margin:20px 0;
}

.qr img{
    width:230px;
    border-radius:10px;
}

.info{
    font-size:14px;
    opacity:0.8;
}

button{
    margin-top:20px;
    background:#22c55e;
    border:none;
    padding:14px 25px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    color:black;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

</style></head><body><div class="container"><h2>💳 Depósito via PIX</h2><div class="valor">
Envie o valor solicitado para a chave abaixo
</div><div class="chave">
    30402374894
</div><div class="qr">
<img src="/static/pix_qrcode.png">
</div><div class="info">
Após realizar o pagamento, aguarde a confirmação do sistema ou do administrador.
</div><button onclick="copiar()">📋 Copiar chave PIX</button>

</div><script>

function copiar(){
    navigator.clipboard.writeText("30402374894")
    alert("Chave PIX copiada!")
}

</script></body>
</html>
