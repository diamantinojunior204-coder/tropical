<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Cassino</title>
<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
.topo{padding:10px;background:rgba(0,0,0,0.6);display:flex;justify-content:space-between;align-items:center;}
.topo a{color:gold;text-decoration:none;font-weight:bold;margin-left:10px;}
.jogos{display:flex;flex-direction:column;align-items:center;margin-top:50px;}
.jogos a{display:block;margin:10px;background:orange;padding:15px 30px;border-radius:8px;color:black;text-decoration:none;font-weight:bold;}
.jogos a:hover{background:gold;}
</style>
</head>
<body>
<div class="topo">
<div>Olá, {{session.username}} | Saldo: R$ <span id="saldo">{{saldo}}</span></div>
<div><a href="/logout">Sair</a> | <a href="/admin">Painel ADM</a></div>
</div>
<div class="jogos">
<a href="/slot">🎰 Slot</a>
</div>
</body>
</html>
