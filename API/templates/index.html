<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassino</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/fundo.jpg");
background-size:cover;
background-position:center;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* TOPO */

.topo{
padding:10px 15px;
background:rgba(0,0,0,0.65);
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:5px;
}

.topo a{
color:gold;
text-decoration:none;
font-weight:bold;
margin:0 5px;
}

.links{
margin-top:5px;
}

/* AREA CENTRAL */

.jogos{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* TITULO */

.titulo{
font-size:32px;
margin-bottom:40px;
text-shadow:0 0 10px black;
}

/* BOTAO SLOT */

.botao-slot{

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
font-weight:bold;

width:80%;
max-width:280px;
height:80px;

border-radius:14px;

background:linear-gradient(145deg,#ff9800,#ffc107);

color:black;

text-decoration:none;

box-shadow:
0 0 15px rgba(255,200,0,0.7),
0 5px 10px rgba(0,0,0,0.6);

transition:all 0.25s;

}

.botao-slot:active{
transform:scale(0.95);
}

/* RESPONSIVO TABLET */

@media(min-width:600px){

.topo{
flex-direction:row;
justify-content:space-between;
text-align:left;
}

.botao-slot{
width:220px;
}

}

</style>

</head>

<body>

<div class="topo">

<div>
Olá, {{session.username}}<br>
Saldo: R$ <span id="saldo">{{saldo}}</span>
</div>

<div class="links">
<a href="/admin">TROPICAL</a> |
<a href="/logout">Sair</a>
</div>

</div>

<div class="jogos">

<div class="titulo">🎰 CassinoDiamante Tropical</div>

<a class="botao-slot" href="/slot">
⚰️ JOGAR SLOT
</a>
  
<a class="botao-slot" href="/frutas">
🍓 JOGAR SLOT Frutas
</a>

</div>

</body>
</html>
