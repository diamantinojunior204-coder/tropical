<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tropical Diamante</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;
background:url("/static/bg.jpg");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
}

/* overlay */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
backdrop-filter: blur(4px);
}

/* container */

.menu{
position:relative;
width:95%;
max-width:420px;

background:rgba(0,0,0,0.7);
border-radius:20px;

padding:30px;

box-shadow:0 0 25px #ff8c00;

text-align:center;

animation:fade 1s;
}

/* logo */

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{
color:#ff8c00;
}

/* saldo */

.saldo{

background:#140024;
padding:12px;
border-radius:10px;
margin-bottom:25px;

font-size:18px;

box-shadow:0 0 10px #ff8c00 inset;
}

/* botoes */

.btn{

display:block;

width:100%;

padding:16px;

margin:10px 0;

border:none;
border-radius:12px;

font-size:18px;
font-weight:bold;

cursor:pointer;

transition:.3s;
}

/* cores */

.slot{

background:linear-gradient(45deg,#ff8c00,#ff4500);
}

.roleta{

background:linear-gradient(45deg,#00c853,#00ff88);
}

.cartas{

background:linear-gradient(45deg,#2979ff,#00e5ff);
}

.logout{

background:#444;
}

/* hover */

.btn:hover{

transform:scale(1.05);
box-shadow:0 0 15px #fff;
}

/* animação */

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="menu">

<div class="logo">
<span>TROPICAL</span> DIAMANTE
</div>

<div class="saldo">
💰 Saldo: R$ {{saldo}}
</div>

<button class="btn slot" onclick="window.location='/slot'">
🎰 Slot Halloween
</button>

<button class="btn roleta" onclick="window.location='/roleta'">
🎡 Roleta Europeia
</button>

<button class="btn cartas" onclick="window.location='/cartas'">
🃏 Cartas Cassino
</button>

<button class="btn logout" onclick="window.location='/logout'">
🚪 Sair
</button>

</div>

</body>
</html>
