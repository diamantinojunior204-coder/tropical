<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Cassino</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:15px; }
a { padding:10px 20px; background:#2563eb; color:white; text-decoration:none; border-radius:5px; }
a:hover { background:#1d4ed8; }
h2 { margin-bottom:10px; }
</style>
</head>
<body>
<h2>Bem-vindo {{ session['username'] }}!</h2>
<p>Saldo: R$ {{ saldo }}</p>
<a href="/slot">Slot</a>
<a href="/roleta">Roleta</a>
<a href="/cartas">Cartas</a>
{% if session['is_admin']==1 %}
<a href="/admin">Painel Admin</a>
{% endif %}
<a href="/logout">Sair</a>
</body>
</html>
