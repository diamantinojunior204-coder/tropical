<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassino Online</title><style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:url("/static/fundo.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
    text-align:center;
}

/* camada escura */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* topo */

.topo{
    background:rgba(0,0,0,0.7);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.usuario{
    font-size:18px;
}

.saldo{
    font-size:20px;
    color:#22c55e;
    font-weight:bold;
}

/* botão deposito */

.depositar{
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

/* jogos */

.titulo{
    margin-top:30px;
    font-size:30px;
}

.jogos{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card{
    background:rgba(15,23,42,0.9);
    width:170px;
    padding:20px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card span{
    font-size:45px;
}

.card h3{
    margin-top:10px;
}

/* logout */

.logout{
    margin-top:40px;
}

.logout a{
    color:#f87171;
    text-decoration:none;
}

</style></head><body><!-- musica ambiente --><audio autoplay loop>
<source src="/static/musica.mp3" type="audio/mpeg">
</audio><div class="topo"><div class="usuario">
👤 Olá {{session.username}}
</div><div class="saldo">
💰 Saldo: R$ {{saldo}}
</div><a class="depositar" href="/depositar">
💳 Depositar
</a></div><h2 class="titulo">🎰 Jogos</h2><div class="jogos"><a class="card" href="/slot">
<span>🎰</span>
<h3>Slot</h3>
</a><a class="card" href="/frutas">
<span>🍓</span>
<h3>Roleta</h3>
</a><a class="card" href="/cartas">
<span>🃏</span>
<h3>Cartas</h3>
</a></div><div class="logout">
<a href="/logout">🚪 Sair</a>
</div></body>
</html>
