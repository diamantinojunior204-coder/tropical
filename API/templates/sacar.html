<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Saque PIX</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:50px;
}

form{
background:#1e293b;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:none;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:orange;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:gold;
}

</style>
</head>

<body>

<h2>💸 Solicitar Saque PIX</h2>

<form method="POST">

<input type="number" name="valor" placeholder="Valor do saque" required>

<input type="text" name="pix" placeholder="Chave PIX" required>

<button type="submit">Solicitar Saque</button>

</form>

</body>
</html>
