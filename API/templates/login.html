<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Cassino</title>
<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.container {background:rgba(0,0,0,0.7);padding:20px;border-radius:12px;width:90%;max-width:350px;}
input {width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none;}
button {width:100%;padding:12px;margin-top:10px;background:orange;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
button:hover{background:gold;}
h2{text-align:center;margin-bottom:20px;}
a{text-decoration:none;color:gold;}
</style>
</head>
<body>
<div class="container">
<h2>🎰 Cassino Login</h2>
<form method="POST" action="/">
<input type="text" name="usuario" placeholder="Usuário" required>
<input type="password" name="senha" placeholder="Senha" required>
<button type="submit">Entrar</button>
</form>
<p>Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
</div>
</body>
</html>
