<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:#181818;
padding:30px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

h2{
color:gold;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
}

a{
color:#aaa;
}

</style>

</head>

<body>

<div class="card">

<h2>🎰 Cassino</h2>

<form method="POST">

<input name="usuario" placeholder="Usuário" required>

<input name="senha" type="password" placeholder="Senha" required>

<button>Entrar</button>

</form>

<br>

<a href="/cadastro">Criar conta</a>

</div>

</body>
</html>
