<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Cassino</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; display:flex; align-items:center; justify-content:center; height:100vh; }
form { background:#1e293b; padding:20px; border-radius:10px; display:flex; flex-direction:column; gap:10px; width:300px; }
input { padding:10px; border:none; border-radius:5px; }
button { padding:10px; background:#2563eb; color:white; border:none; border-radius:5px; cursor:pointer; }
button:hover { background:#1d4ed8; }
a { color:#60a5fa; text-decoration:none; font-size:14px; text-align:center; }
</style>
</head>
<body>
<form method="POST">
<h2>Login</h2>
<input type="text" name="usuario" placeholder="Usuário" required>
<input type="password" name="senha" placeholder="Senha" required>
<button type="submit">Entrar</button>
<a href="/cadastro">Cadastrar</a>
</form>
</body>
</html>
