<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot HELLOWEEN</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("/static/fundo.jpg");
  background-size:cover;
  color:white;
  text-align:center;
}

.topo{
  padding:10px 20px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
}

#usuario{ color:#00eaff; }
#saldo{ color:gold; font-size:24px; }
#jackpot{
  color:#ffd700;
  font-size:26px;
  text-shadow:0 0 10px gold,0 0 20px orange;
  animation:jackpotGlow 1.2s infinite alternate;
}

@keyframes jackpotGlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.05); }
}

.slot{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
  justify-content:center;
}

.celula{
  width:100px;
  height:100px;
  background:black;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid gold;
}

.celula img{
  width:80px;
}

.controls{
  margin-top:20px;
}

button{
  padding:14px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:orange;
  cursor:pointer;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

.win{
  animation:piscar 0.5s infinite;
}

@keyframes piscar{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 25px orange;}
  100%{box-shadow:0 0 10px gold;}
}

#resultado{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="/static/audio/jogo2.mp3">
</audio>

<div class="topo">
  <div id="usuario">👤 {{ session.username }}</div>
  <div>💰 R$ <span id="saldo">{{saldo}}</span></div>
  <div>💎 <span id="jackpot">{{jackpot}}</span></div>
</div>

<h1>🎰 Halloween Slot</h1>

<div class="slot">
  <div class="celula"><img id="c0"></div>
  <div class="celula"><img id="c1"></div>
  <div class="celula"><img id="c2"></div>
  <div class="celula"><img id="c3"></div>
  <div class="celula"><img id="c4"></div>
  <div class="celula"><img id="c5"></div>
  <div class="celula"><img id="c6"></div>
  <div class="celula"><img id="c7"></div>
  <div class="celula"><img id="c8"></div>
</div>

<div class="controls">
  <input id="aposta" type="number" value="10" min="1">
  <button id="btnGirar" onclick="girar()">🎰 GIRAR</button>
</div>

<div id="resultado"></div>

<audio id="somGiro" src="/static/audio2.mp3"></audio>
<audio id="somWin" src="/static/win.mp3"></audio>

<script>

let girando = false;

function animarSaldo(valorFinal){
  let el=document.getElementById("saldo");
  let atual=parseFloat(el.innerText) || 0;

  let i=setInterval(()=>{
    atual+=(valorFinal-atual)*0.2;
    el.innerText=atual.toFixed(2);

    if(Math.abs(valorFinal-atual)<0.05){
      el.innerText=valorFinal.toFixed(2);
      clearInterval(i);
    }
  },30);
}

function girar(){

  if(girando) return;

  let btn=document.getElementById("btnGirar");
  btn.disabled=true;
  girando=true;

  let aposta=parseFloat(document.getElementById("aposta").value);

  if(!aposta || aposta<=0){
    alert("Aposta inválida");
    btn.disabled=false;
    girando=false;
    return;
  }

  document.getElementById("somGiro").currentTime=0;
  document.getElementById("somGiro").play();

  let tempo=0;

  let anim=setInterval(()=>{

    for(let i=0;i<9;i++){
      let r=Math.floor(Math.random()*5)+1;
      document.getElementById("c"+i).src="/static/slot2/"+r+".jpg";
    }

    tempo+=100;

    if(tempo>=2000){
      clearInterval(anim);
      resultadoFinal();
    }

  },100);

  function resultadoFinal(){

    fetch("/api/slot2",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        aposta: aposta
      
      })
    })
    .then(r=>r.json())
    .then(data=>{

      if(data.erro){
        alert(data.erro);
        liberar();
        return;
      }

      animarSaldo(data.saldo);
      document.getElementById("jackpot").innerText=data.jackpot;

      let grade=data.grade.flat();

      for(let i=0;i<9;i++){
        let el=document.getElementById("c"+i);
        el.src="/static/slot/"+grade[i]+".jpg";
        el.classList.remove("win");
      }

      if(data.linhas_ganhas){
        data.linhas_ganhas.forEach(linha=>{
          linha.forEach(idx=>{
            document.getElementById("c"+idx).classList.add("win");
          });
        });
      }

      let res=document.getElementById("resultado");

      if(data.ganho>0){
        document.getElementById("somWin").play();

        let texto="🎉 GANHOU R$ "+data.ganho;

        if(data.multiplicador>1){
          texto+=" x"+data.multiplicador+" 🔥";
        }

        if(data.bonus){
          texto+="<br>🎁 BONUS!";
        }

        if(data.ganho>500){
          texto+="<br>💎 JACKPOT!";
        }

        res.innerHTML=texto;

      }else{
        res.innerHTML="Boa sorte!";
      }

      liberar();

    })
    .catch(()=>{
      alert("Erro servidor");
      liberar();
    });

  }

  function liberar(){
    btn.disabled=false;
    girando=false;
  }

}

</script>

</body>
</html>
