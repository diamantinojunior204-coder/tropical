<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Halloween Slot</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/fundo.jpg");
background-size:cover;
color:white;
text-align:center;
}

/* TOPO */

.topo{
padding:10px 20px;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#usuario{color:#00eaff;}
#saldo{color:gold;font-size:22px;}
#jackpot{
color:#ffd700;
font-size:24px;
animation:jackpotGlow 1s infinite alternate;
}

@keyframes jackpotGlow{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* SLOT GRID */

.slot{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,110px);
gap:10px;
justify-content:center;
}

/* CELULA CORRIGIDA */

.celula{
width:110px;
height:110px;
background:radial-gradient(circle,#111,#000);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
border:3px solid gold;
overflow:hidden;
}

/* IMAGEM FIXA */

.celula img{
width:80px;
height:80px;
object-fit:contain;
}

/* WIN */

.win{
animation:winFlash 0.4s infinite;
}

@keyframes winFlash{
0%{box-shadow:0 0 10px gold;}
50%{box-shadow:0 0 30px orange;}
100%{box-shadow:0 0 10px gold;}
}

/* CONTROLES */

.controls{margin-top:20px;}

button{
padding:14px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:orange;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

/* RESULTADO */

#resultado{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

/* FLASH TELA */

@keyframes telaFlash{
0%{background:#000;}
50%{background:#330000;}
100%{background:#000;}
}

</style>
</head>

<body>

<div class="topo">
<div id="usuario">👤 {{session.username}}</div>
<div>💰 <span id="saldo">R$ {{saldo}}</span></div>
<div>💎 <span id="jackpot">{{jackpot}}</span></div>
</div>

<h1>🎰 Halloween Slot</h1>

<!-- ✅ GRID CORRIGIDO -->
<div class="slot">

<div class="celula"><img id="c0"></div>
<div class="celula"><img id="c1"></div>
<div class="celula"><img id="c2"></div>

<div class="celula"><img id="c3"></div>
<div class="celula"><img id="c4"></div>
<div class="celula"><img id="c5"></div>

<div class="celula"><img id="c6"></div>
<div class="celula"><img id="c7"></div>
<div class="celula"><img id="c8"></div>

</div>

<div class="controls">
<input id="aposta" type="number" value="10" min="1">
<br><br>
<button onclick="girar()">🎰 GIRAR</button>
</div>

<div id="resultado"></div>

<!-- SONS -->
<audio id="somGiro" src="/static/audio/jogo2.mp3"></audio>
<audio id="somWin" src="/static/win.mp3"></audio>

<script>

/* MAPA DE IMAGENS */

const mapaImgs={
1:"/static/slot2/1.jpg",
2:"/static/slot2/2.jpg",
3:"/static/slot2/3.jpg",
4:"/static/slot2/4.jpg",
5:"/static/slot2/5.jpg"

};

/* ANIMAÇÃO SALDO */

function animarSaldo(valorFinal){

let el=document.getElementById("saldo");
let atual=parseFloat(el.innerText.replace("R$",""));

let i=setInterval(()=>{

atual+=(valorFinal-atual)*0.2;
el.innerText="R$ "+atual.toFixed(2);

if(Math.abs(valorFinal-atual)<0.05){
el.innerText="R$ "+valorFinal.toFixed(2);
clearInterval(i);
}

},30);

}

/* GIRAR */

function girar(){

let aposta=parseFloat(document.getElementById("aposta").value);

if(aposta<=0){
alert("Aposta inválida");
return;
}

document.getElementById("somGiro").play();

let tempo=0;

let anim=setInterval(()=>{

for(let i=0;i<9;i++){
let r=Math.floor(Math.random()*5)+1;
document.getElementById("c"+i).src=mapaImgs[r];
}

tempo+=100;

if(tempo>=1500){
clearInterval(anim);
resultadoFinal();
}

},100);

}

/* RESULTADO FINAL */

function resultadoFinal(){

let aposta=parseFloat(document.getElementById("aposta").value);
fetch("/api/slot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
aposta: aposta

})
})

.then(r=>r.json())
.then(data=>{

if(data.erro){
alert(data.erro);
return;
}

/* saldo e jackpot */
animarSaldo(data.saldo);
document.getElementById("jackpot").innerText=data.jackpot;

/* aplicar resultado */
let grade=data.grade.flat();

for(let i=0;i<9;i++){

let el=document.getElementById("c"+i);

el.src=mapaImgs[grade[i]];
el.classList.remove("win");

}

/* linhas ganhas */
if(data.linhas_ganhas){
data.linhas_ganhas.forEach(linha=>{
linha.forEach(idx=>{
document.getElementById("c"+idx).classList.add("win");
});
});
}

/* resultado texto */
let res=document.getElementById("resultado");

if(data.ganho>0){

document.getElementById("somWin").play();

let texto="🎉 GANHOU R$ "+data.ganho;

if(data.multiplicador>1){
texto+=" x"+data.multiplicador+" 🔥";
}

if(data.bonus){
texto+="<br>🎁 BONUS!";
}

if(data.ganho>500){
texto+="<br>💎 JACKPOT!";
}

res.innerHTML=texto;

document.body.style.animation="telaFlash 0.3s 6";

}else{

res.innerHTML="Boa sorte!";

}

})
.catch(()=>{
alert("Erro servidor");
});

}

</script>

</body>
</html>
