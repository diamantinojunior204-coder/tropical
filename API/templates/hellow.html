<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Halloween</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("/static/fundo.jpg");
  background-size:cover;
  color:white;
  text-align:center;
}

.topo{
  padding:10px 20px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
}

#usuario{
  font-size:18px;
  color:#00eaff;
}

#saldo{
  font-weight:bold;
  color:gold;
  font-size:24px;
}

#jackpot{
  font-weight:bold;
  color:#ffd700;
  font-size:26px;
  text-shadow:0 0 10px gold,0 0 20px orange;
  animation:jackpotGlow 1.2s infinite alternate;
}

@keyframes jackpotGlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.05); }
}

.slot{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(3,100px);
  grid-gap:10px;
  justify-content:center;
}

.celula{
  width:100px;
  height:100px;
  background:black;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid gold;
}

.celula img{
  width:80px;
}

.controls{
  margin-top:20px;
}

button{
  padding:14px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:orange;
  cursor:pointer;
}

input{
  padding:10px;
  width:120px;
  font-size:16px;
}

.win{
  animation:piscar 0.5s infinite;
}

@keyframes piscar{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 25px orange;}
  100%{box-shadow:0 0 10px gold;}
}

#resultado{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topo">
  <div id="usuario">
    👤 Boa sorte, {{ session.username }}
  </div>

  <div>
    💰 Saldo: <span id="saldo">R$ {{saldo}}</span>
  </div>

  <div>
    💎 Jackpot: <span id="jackpot">{{jackpot}}</span>
  </div>
</div>

<h1>🎰 Caça-Níquel Halloween</h1>

<div class="slot">
  <div class="celula"><img id="c0"></div>
  <div class="celula"><img id="c1"></div>
  <div class="celula"><img id="c2"></div>
  <div class="celula"><img id="c3"></div>
  <div class="celula"><img id="c4"></div>
  <div class="celula"><img id="c5"></div>
  <div class="celula"><img id="c6"></div>
  <div class="celula"><img id="c7"></div>
  <div class="celula"><img id="c8"></div>
</div>

<div class="controls">
  <input id="aposta" type="number" value="10" min="1">
  <button onclick="girar()">🎰 GIRAR</button>
</div>

<div id="resultado"></div>

<audio id="somGiro" src="/static/audio/jogo2.mp3"></audio>
<audio id="somWin" src="/static/win.mp3"></audio>

<script>

/* MAPEAMENTO DO BACKEND */
const mapaImgs={
  "bruxa":"/static/halloween/bruxa.png",
  "caveira":"/static/halloween/caveira.png",
  "abobora":"/static/halloween/abobora.png",
  "fantasma":"/static/halloween/fantasma.png",
  "tridente":"/static/halloween/tridente.png"
};

/* ANIMA SALDO */
function animarSaldo(valorFinal){

  let el=document.getElementById("saldo");
  let atual=parseFloat(el.innerText.replace("R$",""));

  let i=setInterval(()=>{

    atual+=(valorFinal-atual)*0.2;
    el.innerText="R$ "+atual.toFixed(2);

    if(Math.abs(valorFinal-atual)<0.05){
      el.innerText="R$ "+valorFinal.toFixed(2);
      clearInterval(i);
    }

  },30);
}

/* SPIN */

function girar(){

  let aposta=parseFloat(document.getElementById("aposta").value);

  if(aposta<=0){
    alert("Aposta inválida");
    return;
  }

  document.getElementById("somGiro").play();

  let tempo=0;

  let anim=setInterval(()=>{

    Object.values(document.querySelectorAll(".celula img")).forEach((img)=>{
      let keys=Object.keys(mapaImgs);
      let rand=keys[Math.floor(Math.random()*keys.length)];
      img.src=mapaImgs[rand];
    });

    tempo+=100;

    if(tempo>=1500){
      clearInterval(anim);
      resultadoFinal();
    }

  },100);

}

/* RESULTADO FINAL */

function resultadoFinal(){

  let aposta=parseFloat(document.getElementById("aposta").value);

  fetch("/api/slot_master",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      aposta:aposta,
      tema:"halloween"
    })
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.erro){
      alert(data.erro);
      return;
    }

    animarSaldo(data.saldo);

    document.getElementById("jackpot").innerText=data.jackpot;

    let resultado=data.resultado;

    for(let i=0;i<9;i++){

      let simbolo=resultado[i%3]; // adapta 3 → 9 grid

      let el=document.getElementById("c"+i);

      el.src=mapaImgs[simbolo];

      el.classList.remove("win");
    }

    if(data.ganho>0){

      document.getElementById("somWin").play();

      document.getElementById("resultado").innerHTML=
      "🎉 GANHOU R$ "+data.ganho;

    }else{
      document.getElementById("resultado").innerHTML="Boa sorte!";
    }

  })
  .catch(()=>{
    alert("Erro servidor");
  });

}

</script>

</body>
</html>
