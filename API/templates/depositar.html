<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depositar</title><style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#020617,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* caixa principal */

.container{
    background:#0f172a;
    padding:35px;
    border-radius:15px;
    text-align:center;
    width:90%;
    max-width:420px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* título */

h2{
    margin-bottom:25px;
    font-size:28px;
}

/* campo valor */

input{
    width:90%;
    padding:14px;
    font-size:18px;
    border-radius:8px;
    border:none;
    margin-bottom:20px;
    text-align:center;
}

/* botão */

button{
    width:100%;
    padding:14px;
    font-size:20px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* voltar */

.voltar{
    margin-top:20px;
}

.voltar a{
    color:#94a3b8;
    text-decoration:none;
}

</style></head><body><div class="container"><h2>💳 Depositar via PIX</h2><form method="POST"><input
type="number"
name="valor"
placeholder="Digite o valor do depósito"
step="0.01"
min="1"
required

«»

<button type="submit">
💰 Gerar PIX
</button></form><div class="voltar">
<a href="/index">⬅ Voltar</a>
</div></div></body>
</html>
