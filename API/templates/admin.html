<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
color:gold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #444;
text-align:center;
}

button{
background:gold;
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:orange;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>
<body>

<h1>Painel Administrativo</h1>

<div class="card">

<h2>Lucro do Cassino</h2>

<canvas id="grafico"></canvas>

</div>

<div class="card">

<h2>Usuários</h2>

<table>

<tr>
<th>ID</th>
<th>Usuário</th>
<th>Saldo</th>
<th>Ação</th>
</tr>

{% for u in users %}

<tr>

<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>R$ {{u[2]}}</td>

<td>
<button onclick="addSaldo({{u[0]}})">
Adicionar saldo
</button>
</td>

</tr>

{% endfor %}

</table>

</div>

<script>

function addSaldo(user){

let valor = prompt("Valor para adicionar")

if(!valor) return

fetch("/api/add_saldo",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"user_id="+user+"&valor="+valor
})
.then(r=>r.json())
.then(d=>{
location.reload()
})

}

</script>

<script>

let ctx = document.getElementById("grafico")

new Chart(ctx,{

type:"line",

data:{
labels:["Hoje"],
datasets:[{
label:"Lucro",
data:[{{lucro}}],
borderColor:"gold",
backgroundColor:"transparent"
}]
},

options:{
scales:{
y:{
beginAtZero:true
}
}
}

})

</script>

</body>
</html>
