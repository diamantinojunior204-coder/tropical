<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Cassino</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
h2 { color:#facc15; }
table { width:100%; border-collapse:collapse; margin-bottom:20px; }
th, td { border:1px solid #334155; padding:8px; text-align:center; }
th { background:#1e293b; }
input, button { padding:5px; margin:2px; border-radius:5px; border:none; }
button { background:#16a34a; color:white; cursor:pointer; }
button:hover { background:#15803d; }
form { display:flex; justify-content:center; gap:5px; }
</style>
</head>
<body>
<h2>Painel Admin</h2>

<h3>Usuários</h3>
<table>
<tr>
<th>ID</th><th>Usuário</th><th>Saldo</th><th>Ações</th>
</tr>
{% for user in users %}
<tr>
<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>
<td>R$ {{ user[2] }}</td>
<td>
<form method="POST" action="/add_saldo">
<input type="hidden" name="user_id" value="{{ user[0] }}">
<input type="number" name="valor" step="0.01" placeholder="R$" required>
<button type="submit">Adicionar/Remover</button>
</form>
</td>
</tr>
{% endfor %}
</table>

<h3>Estatísticas</h3>
<p>Total Apostado: R$ {{ total_apostado }}</p>
<p>Total Pago: R$ {{ total_pago }}</p>
<p>Lucro: R$ {{ lucro }}</p>

<a href="/index">Voltar</a>
</body>
</html>
