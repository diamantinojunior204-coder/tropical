<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.topo{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.topo a{
color:gold;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
flex:1;
min-width:200px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}

th{
background:#020617;
}

input{
padding:5px;
border-radius:5px;
border:none;
width:80px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
background:orange;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:gold;
}

.delete{
background:#ef4444;
color:white;
}

</style>
</head>

<body>

<div class="topo">
<div>
👮 Painel Admin
</div>

<div>
<a href="/index">Menu</a> |
<a href="/logout">Sair</a>
</div>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Apostado</h3>
R$ {{total_apostado}}
</div>

<div class="card">
<h3>Total Pago</h3>
R$ {{total_pago}}
</div>

<div class="card">
<h3>Lucro Cassino</h3>
R$ {{lucro}}
</div>

</div>

<h2>Usuários</h2>

<table>

<tr>
<th>ID</th>
<th>Usuário</th>
<th>Saldo</th>
<th>Adicionar</th>
<th>Definir</th>
<th>Banir</th>
</tr>

{% for u in users %}

<tr>

<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>R$ {{u[2]}}</td>

<td>
<form action="/admin/add_credito" method="post">
<input type="hidden" name="user_id" value="{{u[0]}}">
<input type="number" step="0.01" name="valor" required>
<button>+</button>
</form>
</td>

<td>
<form action="/add_saldo" method="POST">

<input type="hidden" name="user_id" value="{{ user[0] }}">

<input type="number" name="valor" step="0.01" placeholder="Valor">

<button type="submit">Adicionar saldo</button>

</form>
</td>

<td>
<a href="/admin/delete/{{u[0]}}">
<button class="delete">X</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
