<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel ADM 🎃</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1b0b2e, #050008);
  color:#fff;
}

header{
  padding:20px;
  text-align:center;
  background:#12001f;
  box-shadow:0 0 15px rgba(255,140,0,.4);
}

header h1{
  margin:0;
  color:#ff8c00;
}

.container{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(0,0,0,.6);
  border-radius:12px;
  overflow:hidden;
}

th, td{
  padding:12px;
  text-align:center;
}

th{
  background:#1f0033;
  color:#ff8c00;
}

tr:nth-child(even){
  background:rgba(255,255,255,.03);
}

form{
  display:flex;
  gap:5px;
  justify-content:center;
}

input[type="number"]{
  width:80px;
  padding:6px;
  border-radius:6px;
  border:none;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ff8c00;
  font-weight:bold;
}

button:hover{
  background:#ff4500;
}

.logout{
  margin-top:20px;
  text-align:center;
}

.logout a{
  color:#ff8c00;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>🎰 Painel Administrativo</h1>
  <p>Controle total do cassino</p>
</header>

<div class="container">

<table>
  <tr>
    <th>ID</th>
    <th>Usuário</th>
    <th>Saldo</th>
    <th>Tipo</th>
    <th>Adicionar Créditos</th>
  </tr>

  {% for u in users %}
  <tr>
    <td>{{ u[0] }}</td>
    <td>{{ u[1] }}</td>
    <td>R$ {{ "%.2f"|format(u[2]) }}</td>
    <td>
      {% if u[3] == 1 %}
        👑 ADM
      {% else %}
        🎮 Jogador
      {% endif %}
    </td>
    <td>
      <form method="POST" action="/add_saldo">
        <input type="hidden" name="user_id" value="{{ u[0] }}">
        <input type="number" step="0.01" name="valor" placeholder="+R$" required>
        <button>Adicionar</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>

<div class="logout">
  <a href="/logout">🚪 Sair</a>
</div>

</div>

</body>
</html>
