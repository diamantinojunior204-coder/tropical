<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
background:gold;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Painel Admin</h2>

<h3>Adicionar saldo</h3>

<input id="user" placeholder="Usuário">

<input id="valor" placeholder="Valor">

<button onclick="add()">Adicionar</button>

<br><br>

<h3>Remover saldo</h3>

<input id="user2" placeholder="Usuário">

<input id="valor2" placeholder="Valor">

<button onclick="rem()">Remover</button>

<script>

function add(){

fetch("/api/admin/add",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body="username="+user.value+"&valor="+valor.value

})

}

function rem(){

fetch("/api/admin/remove",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body="username="+user2.value+"&valor="+valor2.value

})

}

</script>

</body>
</html>
