<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:#1b1b1b;
padding:30px;
border-radius:10px;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="card">

<h2>Criar conta</h2>

<form action="/api/cadastro" method="POST">

<input name="username" placeholder="Usuário" required>

<input name="password" type="password" placeholder="Senha" required>

<button>Cadastrar</button>

</form>

</div>

</body>
</html>
