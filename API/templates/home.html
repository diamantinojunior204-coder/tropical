<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamante Tropical - Diversão Online</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
        background: #0a0a0a;
        color: white;
        padding-bottom: 80px;
    }

    /* TOPO */
    .header {
        background: linear-gradient(180deg, #000, #111);
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #ff7a00;
    }

    /* ANIMAÇÃO PISCANTE DO LOGO */
    .logo {
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        color: #ff7a00;
        text-shadow: 0 0 5px #ff7a00;
        animation: piscar 1.5s infinite alternate;
    }

    @keyframes piscar {
        0% { opacity: 1; text-shadow: 0 0 20px #ff7a00, 0 0 30px #ffea00; }
        50% { opacity: 0.7; text-shadow: 0 0 5px #ff7a00; }
        100% { opacity: 1; text-shadow: 0 0 20px #ff7a00, 0 0 40px #ffea00; }
    }

    .login {
        background: linear-gradient(to bottom, #ff9d00, #ff7a00);
        padding: 8px 18px;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 10px rgba(255, 122, 0, 0.5);
    }

    /* BANNER COM TRANSIÇÃO */
    .banner {
        width: 100%;
        padding: 10px;
        height: 200px;
        overflow: hidden;
    }

    .banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 15px;
        border: 1px solid #333;
        transition: opacity 0.5s ease-in-out;
    }

    /* TITULO */
    .titulo {
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        color: #ffea00;
        display: flex;
        align-items: center;
    }

    /* GRID DE JOGOS */
    .jogos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        padding: 10px;
    }

    .card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid #222;
        background: #151515;
    }

    .card img {
        width: 100%;
        display: block;
        transition: 0.4s;
    }

    .card:hover img {
        transform: scale(1.15);
        filter: brightness(1.2);
    }

    .nome {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.8);
        padding: 8px;
        font-size: 12px;
        text-align: center;
        font-weight: bold;
    }

    /* MENU INFERIOR */
    .menu {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        padding: 12px 0;
        border-top: 1px solid #333;
        z-index: 100;
    }

    .menu a { text-decoration: none; }

    .menu div {
        text-align: center;
        font-size: 11px;
        color: #888;
    }

    .menu div:hover { color: #ff7a00; }

    @media(max-width:700px){
        .jogos { grid-template-columns: repeat(2, 1fr); }
        .logo { font-size: 18px; }
    }
</style>
</head>

<body>

<div class="header">
    <div class="logo" id="logo">DIAMANTE TROPICAL</div>
    <a href="/admin" class="login">LOGIN</a>
</div>

<!-- BANNER DINÂMICO -->
<div class="banner">
    <img id="bannerImg" src="/static/banner.jpg" alt="Banner">
</div>

<div class="titulo">🔥 JOGOS EM ALTA</div>

<div class="jogos">
    <!-- Jogo 1 -->
    <a href="/slot">
        <div class="card">
            <img src="/static/img/Jogo1.jpg">
            <div class="nome">Sloty Clássico</div>
        </div>
    </a>

    <!-- Jogo 2 -->
    <a href="/frutas">
        <div class="card">
            <img src="/static/img/jogo2.jpg">
            <div class="nome">Fruit Slot</div>
        </div>
    </a>

    <!-- Jogo 3 -->
    <a href="/diamantino">
        <div class="card">
            <img src="/static/img/dq.jpg">
            <div class="nome">Diamantino</div>
        </div>
    </a>

    <!-- Jogo 4 -->
    <a href="/hellow">
        <div class="card">
            <img src="/static/slot2/capetinha.png">
            <div class="nome">Helloween Special</div>
        </div>
    </a>
</div>

<!-- MENU INFERIOR -->
<div class="menu">
    <a href="/index"><div>🏠<br>Início</div></a>
    <a href="/slot"><div>🎃<br>Helloween</div></a>
    <a href="/frutas"><div>🍎<br>Frut Slot</div></a>
    <a href="/diamantino"><div>💎<br>Diamante</div></a>
    <a href="/index"><div>👤<br>Perfil</div></a>
</div>

<script>
    // LISTA DE IMAGENS PARA O BANNER (Coloque os nomes das fotos que estão na sua pasta static/img)
    const imagensBanner = [
        "/static/banner.jpg",
        "/static/jogo5.jpg",
        "/static/jogo6.jpg"
    ];

    let indexAtual = 0;
    const bannerElemento = document.getElementById('bannerImg');

    function trocarBanner() {
        indexAtual++;
        if (indexAtual >= imagensBanner.length) {
            indexAtual = 0;
        }
        
        // Efeito suave de troca
        bannerElemento.style.opacity = 0;
        
        setTimeout(() => {
            bannerElemento.src = imagensBanner[indexAtual];
            bannerElemento.style.opacity = 1;
        }, 500);
    }

    // Troca a imagem a cada 4 segundos
    setInterval(trocarBanner, 4000);
</script>

</body>
</html>
