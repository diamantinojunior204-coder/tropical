<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Slot Frutas</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/script.js') }}" defer></script><style>
#painel{
text-align:center;
color:white;
font-size:18px;
margin-bottom:15px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

#saldo{color:#00ff88;font-weight:bold;}
#jackpot{color:#ffd700;font-weight:bold;}

#mensagem{
margin-top:10px;
text-align:center;
}
</style></head><body><div id="game"><div id="painel">👋 Olá, <b>{{username}}</b><br>

💰 Saldo: R$ <span id="saldo">{{saldo}}</span><br>

💎 Jackpot: R$ <span id="jackpot">100</span>

<br><br>

Aposta:<br>
<input type="number" id="aposta" value="1" min="1">

</div><div id="container"><div class="window-border">
<div class="window"><div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div><div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div><div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div><div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div><div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div><div class="outer-spacer"></div></div>
</div><input type="button" onclick="girar(this)" class="start-button" value="🎰 GIRAR"></div><div id="mensagem"></div></div><audio id="somGiro" src="/static/audio/girar.mp3"></audio>
<audio id="somWin" src="/static/audio/audio1.mp3"></audio>

<script>

function girar(botao){

let aposta = document.getElementById("aposta").value

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({aposta:aposta})
})
.then(res => res.json())
.then(data => {

if(data.error){
msg("Erro: "+data.error,"red")
return
}

// 🔥 ESSENCIAL (não mexer)
setResult(data.resultado)
spin(botao)

// atualiza depois da animação
setTimeout(()=>{

document.getElementById("saldo").innerText = data.saldo
document.getElementById("jackpot").innerText = data.jackpot

if(data.ganhou_jackpot){
document.getElementById("somWin").play()
msg("💎 JACKPOT!!! R$ "+data.ganho,"gold")
}
else if(data.ganho > 0){
document.getElementById("somWin").play()
msg("🎉 Ganhou R$ "+data.ganho,"green")
}
else{
msg("😢 Não foi dessa vez","orange")
}

},1200)

})

.catch(()=>{
msg("Erro no servidor","red")
})

}

function msg(txt,cor){
document.getElementById("mensagem").innerHTML =
"<div style='background:"+cor+";padding:10px;border-radius:10px;color:white;'>"+txt+"</div>"
}

</script></body>
</html>
