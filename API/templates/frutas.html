<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🎰 Slot Master</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#0a0a0a,#000);
color:white;
text-align:center;
}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
}

#saldo{color:gold;font-size:22px;}
#jackpot{
color:#ffd700;
font-size:26px;
animation:jackGlow 1s infinite alternate;
}

@keyframes jackGlow{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* SLOT */
.slot{
display:flex;
justify-content:center;
gap:10px;
margin-top:40px;
}

.reel{
width:110px;
height:330px;
overflow:hidden;
border:3px solid gold;
border-radius:12px;
background:#000;
}

.strip{
transition:transform 2s cubic-bezier(.1,.7,.2,1);
}

.symbol{
height:110px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

/* CONTROLES */
.controls{margin-top:20px;}

button{
padding:12px 25px;
font-size:18px;
background:orange;
border:none;
border-radius:8px;
cursor:pointer;
}

/* RESULTADO */
#resultado{
margin-top:15px;
font-size:22px;
}

/* WIN EFFECT */
.win{
animation:flash 0.5s infinite alternate;
}

@keyframes flash{
from{color:white;}
to{color:yellow;}
}
</style>
</head>

<body>

<div class="topo">
<div>💰 <span id="saldo">R$ {{saldo}}</span></div>
<div>💎 <span id="jackpot">0</span></div>
</div>

<h1>🎰 SLOT MASTER</h1>

<div class="slot">
<div class="reel"><div class="strip" id="r1"></div></div>
<div class="reel"><div class="strip" id="r2"></div></div>
<div class="reel"><div class="strip" id="r3"></div></div>
</div>

<div class="controls">
<input id="aposta" type="number" value="10">
<br><br>
<button onclick="girar()">GIRAR 🎰</button>
</div>

<div id="resultado"></div>

<audio id="spin" src="/static/audio/jogo2.mp3"></audio>
<audio id="win" src="/static/win.mp3"></audio>

<script>

/* MAPA */
const mapa = {
1:"🧙",
2:"💀",
3:"🎃",
4:"👻",
5:"🔱"
};

const strips=[
document.getElementById("r1"),
document.getElementById("r2"),
document.getElementById("r3")
];

/* CRIAR SIMBOLOS */
function preencher(){
strips.forEach(strip=>{
for(let i=0;i<40;i++){
let r=Math.floor(Math.random()*5)+1;
let div=document.createElement("div");
div.className="symbol";
div.innerText=mapa[r];
strip.appendChild(div);
}
});
}
preencher();

/* 🎰 GIRAR */
function girar(){

let aposta=parseFloat(document.getElementById("aposta").value);
if(aposta<=0)return alert("Valor inválido");

document.getElementById("spin").play();

fetch("/api/slot_master",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({aposta:aposta,tema:"halloween"})
})
.then(r=>r.json())
.then(data=>{

if(data.erro)return alert(data.erro);

animar(data);

})
.catch(()=>alert("Erro servidor"));

}

/* 🎰 ANIMAÇÃO */
function animar(data){

let grade=data.grade;

strips.forEach((strip,i)=>{

let symbols=strip.children;
let base=Math.floor(symbols.length/2);

// 🎯 QUASE GANHAR (efeito cassino)
let quase=Math.random()<0.3;

for(let j=0;j<3;j++){

let val=grade[j][i];

if(quase && j==2){
val=Math.floor(Math.random()*5)+1;
}

symbols[base+j].innerText=mapa[val];
}

// anima com delay diferente (cassino real)
strip.style.transition="transform "+(1.5+i*0.5)+"s ease-out";
strip.style.transform="translateY(-"+(base*110)+"px)";

});

/* FINALIZA */
setTimeout(()=>finalizar(data),2500);

}

/* FINAL */
function finalizar(data){

document.getElementById("saldo").innerText="R$ "+data.saldo;
document.getElementById("jackpot").innerText=data.jackpot;

let res=document.getElementById("resultado");

if(data.ganho>0){

document.getElementById("win").play();

let txt="🎉 GANHOU R$ "+data.ganho;

if(data.multiplicador>1){
txt+=" x"+data.multiplicador;
}

if(data.bonus){
txt+=" 🎁 BONUS!";
}

if(data.ganho>500){
txt+=" 💎 JACKPOT!";
}

res.innerHTML=txt;
res.classList.add("win");

}else{
res.innerHTML="Tente novamente...";
res.classList.remove("win");
}

}

</script>

</body>
</html>
