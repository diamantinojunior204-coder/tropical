<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Slot Frutas</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/script.js') }}" defer></script>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("/static/img/fundo.png");
background-size:cover;
background-position:center;
font-family:Arial;
padding:10px;
box-sizing:border-box;
}

#game{
width:100%;
max-width:420px;
}

#painel{
text-align:center;
color:white;
font-size:18px;
margin-bottom:15px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

#saldo{
font-weight:bold;
color:#00ff88;
}

#container{
text-align:center;
width:100%;
}

.window-border{
width:100%;
overflow:hidden;
}

.window{
display:flex;
justify-content:center;
}

.outer-col{
width:60px;
overflow:hidden;
}

.col{
display:flex;
flex-direction:column;
align-items:center;
}

.icon img{
width:50px;
height:50px;
}

.start-button{
margin-top:20px;
font-size:20px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
background:orange;
cursor:pointer;
font-weight:bold;
}

.start-button:active{
transform:scale(0.97);
}

input[type="number"]{
font-size:18px;
padding:8px;
width:80px;
text-align:center;
border-radius:6px;
border:none;
margin-top:5px;
}

/* telas maiores */

@media (min-width:600px){

#painel{
font-size:22px;
}

.icon img{
width:70px;
height:70px;
}

.outer-col{
width:80px;
}

.start-button{
font-size:22px;
}

}

</style>

</head>

<body>

<div id="game">

<div id="painel">

💰 Saldo: R$ <span id="saldo">{{saldo}}</span>

<br><br>

Aposta:<br>
<input type="number" id="aposta" value="1" min="1">

</div>


<div id="container">

<div class="window-border">
<div class="window">

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>

</div>
</div>

<input type="button" onclick="girar(this)" class="start-button" value="🎰 GIRAR">

</div>

</div>


<!-- SOM -->
<audio id="somGiro" src="/static/som/girar.mp3"></audio>

<script>

function girar(botao){

let aposta = document.getElementById("aposta").value

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
aposta:aposta
})
})
.then(res => res.json())
.then(data => {

setResult(data.resultado)

document.getElementById("saldo").innerText = data.saldo

if(data.ganho > 0){
alert("🎉 Você ganhou R$ "+data.ganho)
}

})

spin(botao)

}

</script>

</body>
</html>
