<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Slot Frutas</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/script.js') }}" defer></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("/static/img/fundo.jpg");
background-size:cover;
background-position:center;
font-family:Arial;
}

#painel{
text-align:center;
color:white;
font-size:22px;
margin-bottom:20px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

#saldo{
font-weight:bold;
color:#00ff88;
}

#container{
text-align:center;
}

.start-button{
margin-top:20px;
font-size:22px;
padding:15px 40px;
border:none;
border-radius:10px;
background:orange;
cursor:pointer;
font-weight:bold;
}

.start-button:hover{
background:gold;
}

input[type="number"]{
font-size:18px;
padding:5px;
}

</style>

</head>

<body>

<div>

<div id="painel">

💰 Saldo: R$ <span id="saldo">{{saldo}}</span>

<br><br>

Aposta:
<input type="number" id="aposta" value="1" min="1">

</div>


<div id="container">

<div class="window-border">
<div class="window">

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>

</div>
</div>

<input type="button" onclick="girar(this)" class="start-button" value="🎰 GIRAR">

</div>

</div>


<!-- SOM -->
<audio id="somGiro" src="/static/som/girar.mp3"></audio>

<script>

function girar(botao){

let aposta = document.getElementById("aposta").value

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
aposta:aposta
})
})
.then(res => res.json())
.then(data => {

setResult(data.resultado)

document.getElementById("saldo").innerText = data.saldo

if(data.ganho > 0){
alert("🎉 Você ganhou R$ "+data.ganho)
}

})

spin(botao)

}

</script>

</body>
</html>
