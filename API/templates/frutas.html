<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Slot Frutas</title><style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("/static/img/fundo.png");
background-size:cover;
background-position:center;
font-family:Arial;
padding:10px;
box-sizing:border-box;
}

#game{
width:100%;
max-width:420px;
}

#painel{
text-align:center;
color:white;
font-size:18px;
margin-bottom:15px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

#usuario{
font-size:16px;
margin-bottom:5px;
color:#fff;
}

#saldo{
font-weight:bold;
color:#00ff88;
}

#container{
text-align:center;
width:100%;
}

.window-border{
width:100%;
overflow:hidden;
}

.window{
display:flex;
justify-content:center;
}

.outer-col{
width:60px;
overflow:hidden;
}

.col{
display:flex;
flex-direction:column;
align-items:center;
}

.icon img{
width:50px;
height:50px;
}

.start-button{
margin-top:20px;
font-size:20px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
background:orange;
cursor:pointer;
font-weight:bold;
}

.start-button:disabled{
background:#555;
}

.start-button:active{
transform:scale(0.97);
}

input[type="number"]{
font-size:18px;
padding:8px;
width:80px;
text-align:center;
border-radius:6px;
border:none;
margin-top:5px;
}

#mensagem_ganho{
margin-top:15px;
text-align:center;
}

@media (min-width:600px){

#painel{
font-size:22px;
}

.icon img{
width:70px;
height:70px;
}

.outer-col{
width:80px;
}

.start-button{
font-size:22px;
}

}

</style></head><body><div id="game"><div id="painel"><div id="usuario">
👋 Olá, <b>{{username}}</b>
</div>💰 Saldo: R$ <span id="saldo">{{saldo}}</span>

<br><br>

Aposta:<br>
<input type="number" id="aposta" value="1" min="1">

</div><div id="container"><div class="window-border">
<div class="window"><div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div></div>
</div><input type="button" id="btnGirar" onclick="girar()" class="start-button" value="🎰 GIRAR"></div><div id="mensagem_ganho"></div></div><!-- SOM --><audio id="somGiro" src="/static/audio/girar.mp3"></audio>
<audio id="somWin" src="/static/audio/audio1.mp3"></audio>

<script>

function girar(){

let botao = document.getElementById("btnGirar")

if(botao.disabled) return

botao.disabled = true

let aposta = document.getElementById("aposta").value

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
aposta:aposta
})
})
.then(res => res.json())
.then(data => {

if(data.error){
mostrarMensagem(data.error,"red")
botao.disabled = false
return
}

// anima rolo (sua função existente)
setResult(data.resultado)
spin(botao)

// atualizar saldo com delay (fica bonito)
setTimeout(()=>{

document.getElementById("saldo").innerText = parseFloat(data.saldo).toFixed(2)

if(data.ganho > 0){

document.getElementById("somWin").play()

mostrarMensagem("🎉 Você ganhou R$ "+data.ganho,"green")

}else{
mostrarMensagem("😢 Não foi dessa vez","orange")
}

botao.disabled = false

},1200)

})

.catch(()=>{
mostrarMensagem("Erro no servidor","red")
botao.disabled = false
})

}

function mostrarMensagem(msg,cor){

document.getElementById("mensagem_ganho").innerHTML =
"<div style='background:"+cor+";color:white;padding:10px;border-radius:10px;font-size:18px;'>"+msg+"</div>"

}

</script></body>
</html>
