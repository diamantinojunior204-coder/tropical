<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Slot Frutas PRO</title><script src="{{ url_for('static', filename='js/script.js') }}" defer></script><style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("/static/img/fundo.png");
background-size:cover;
font-family:Arial;
}

#game{
width:100%;
max-width:420px;
}

#painel{
text-align:center;
color:white;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

#saldo{color:#00ff88;font-weight:bold;}
#jackpot{color:#ffd700;font-weight:bold;}

.window{
display:flex;
justify-content:center;
gap:5px;
}

.outer-col{
width:70px;
height:220px;
overflow:hidden;
background:black;
border-radius:10px;
}

.col{
display:flex;
flex-direction:column;
align-items:center;
}

.icon img{
width:60px;
height:60px;
}

.start-button{
margin-top:15px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
background:orange;
font-size:20px;
cursor:pointer;
}

.start-button:disabled{background:#555;}

#mensagem{
margin-top:10px;
text-align:center;
color:white;
}

.win{
animation:flash 0.3s infinite;
}

@keyframes flash{
0%{box-shadow:0 0 10px yellow;}
50%{box-shadow:0 0 30px gold;}
100%{box-shadow:0 0 10px yellow;}
}

</style></head><body><div id="game"><div id="painel">👋 Olá, <b>{{username}}</b><br>

💰 Saldo: R$ <span id="saldo">{{saldo}}</span><br>

💎 Jackpot: R$ <span id="jackpot">100</span>

<br><br>

Aposta:<br>
<input type="number" id="aposta" value="1" min="1">

</div><div class="window"><div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div>
<div class="outer-col"><div class="col"></div></div></div><button id="btn" class="start-button" onclick="girar()">🎰 GIRAR</button>

<div id="mensagem">Boa sorte!</div></div><audio id="spinSound" src="/static/audio/girar.mp3"></audio>
<audio id="winSound" src="/static/audio/audio1.mp3"></audio>
<audio id="jackpotSound" src="/static/audio/jackpot.mp3"></audio>

<script>

let saldoAtual = parseFloat(document.getElementById("saldo").innerText)
let jackpotAtual = 100

function girar(){

let btn=document.getElementById("btn")
if(btn.disabled) return
btn.disabled=true

let aposta=document.getElementById("aposta").value

document.getElementById("spinSound").play()

fetch("/api/spin",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({aposta:aposta})
})
.then(r=>r.json())
.then(data=>{

if(data.error){
msg("Erro: "+data.error,"red")
btn.disabled=false
return
}

setResult(data.resultado)
spin(btn)

// anima jackpot subindo
animarJackpot(data.jackpot)

// delay para bater com animação
setTimeout(()=>{

animarSaldo(data.saldo)

if(data.ganhou_jackpot){

document.getElementById("jackpotSound").play()
document.getElementById("game").classList.add("win")

msg("💎 JACKPOT!!! R$ "+data.ganho,"gold")

}else if(data.ganho>0){

document.getElementById("winSound").play()
msg("🎉 Ganhou R$ "+data.ganho,"green")

}else{

msg("😢 Não foi dessa vez","orange")

}

btn.disabled=false

},1200)

})

.catch(()=>{
msg("Erro servidor","red")
btn.disabled=false
})

}

function animarSaldo(novo){

let el=document.getElementById("saldo")
let atual=saldoAtual
let passo=(novo-atual)/20

let i=setInterval(()=>{
atual+=passo

if((passo>0 && atual>=novo)||(passo<0 && atual<=novo)){
atual=novo
clearInterval(i)
}

el.innerText=atual.toFixed(2)

},30)

saldoAtual=novo

}

function animarJackpot(novo){

let el=document.getElementById("jackpot")
let atual=jackpotAtual
let passo=(novo-atual)/20

let i=setInterval(()=>{
atual+=passo

if(atual>=novo){
atual=novo
clearInterval(i)
}

el.innerText=atual.toFixed(2)

},30)

jackpotAtual=novo

}

function msg(txt,cor){
document.getElementById("mensagem").innerHTML=
"<div style='background:"+cor+";padding:10px;border-radius:10px;'>"+txt+"</div>"
}

</script></body>
</html>
