<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot Cassino PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("/static/fundo.jpg");
  background-size:cover;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* topo */
.topo{
  padding:10px 20px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#saldo{color:gold;font-size:24px;}
#jackpot{
  color:#ffd700;
  font-size:26px;
  animation:jackpotGlow 1s infinite alternate;
}
@keyframes jackpotGlow{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* slot */
.slot{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
  justify-content:center;
}

.celula{
  width:100px;
  height:100px;
  background:black;
  border-radius:10px;
  border:3px solid gold;
  display:flex;
  align-items:center;
  justify-content:center;
}

.celula img{width:80px;}

.win{
  animation:piscar 0.3s infinite;
}
@keyframes piscar{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 40px orange,0 0 60px red;}
  100%{box-shadow:0 0 10px gold;}
}

button{
  margin-top:20px;
  padding:14px 25px;
  font-size:18px;
  background:orange;
  border:none;
  border-radius:8px;
}

#resultado{font-size:24px;margin-top:15px;}

/* 🔥 fogo */
#fireWin{
  position:fixed;
  bottom:0;
  width:100%;
  height:0;
  background:linear-gradient(to top,red,orange,yellow,transparent);
  pointer-events:none;
}
@keyframes fogo{
  0%{height:0;}
  50%{height:100%;}
  100%{height:0;}
}

/* 💥 mega win */
#megaWin{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:60px;
  color:gold;
  text-shadow:0 0 30px red;
}

/* 🎇 partículas */
.particle{
  position:fixed;
  width:8px;
  height:8px;
  background:gold;
  border-radius:50%;
  animation:explodir 1s linear forwards;
}
@keyframes explodir{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* 💥 tremor */
@keyframes tremer{
  0%{transform:translate(2px,2px);}
  50%{transform:translate(-2px,-2px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div class="topo">
<div>👤 {{session.username}}</div>
<div>💰 <span id="saldo">R$ {{saldo}}</span></div>
<div>💎 <span id="jackpot">{{jackpot}}</span></div>
</div>

<h1>🎰 SLOT PRO</h1>

<div class="slot">
<img id="c0" src="/static/slot/1.jpeg">
<img id="c1" src="/static/slot/2.jpeg">
<img id="c2" src="/static/slot/3.jpeg">
<img id="c3" src="/static/slot/4.jpeg">
<img id="c4" src="/static/slot/5.jpeg">
<img id="c5" src="/static/slot/1.jpeg">
<img id="c6" src="/static/slot/2.jpeg">
<img id="c7" src="/static/slot/3.jpeg">
<img id="c8" src="/static/slot/4.jpeg">
</div>

<input id="aposta" type="number" value="10">
<button onclick="girar()">🎰 GIRAR</button>

<div id="resultado"></div>

<div id="fireWin"></div>
<div id="megaWin">💥 MEGA WIN 💥</div>

<script>

let girando=false;

/* 🎰 rolagem */
function girarColuna(col,tempo){
return new Promise(r=>{
let i=setInterval(()=>{
for(let j=0;j<3;j++){
let idx=col+(j*3);
document.getElementById("c"+idx).src="/static/slot/"+(Math.floor(Math.random()*6)+1)+".jpeg";
}
},80);
setTimeout(()=>{clearInterval(i);r();},tempo);
});
}

/* 💸 contador */
function animarGanho(v){
let r=0;
let el=document.getElementById("resultado");
let i=setInterval(()=>{
r+=v*0.1;
if(r>=v){r=v;clearInterval(i);}
el.innerHTML="💰 R$ "+r.toFixed(2);
},30);
}

/* 🔥 efeitos */
function fogo(){
let f=document.getElementById("fireWin");
f.style.animation="fogo 2s";
setTimeout(()=>f.style.animation="",2000);
}

function mega(){
let m=document.getElementById("megaWin");
m.style.transform="translate(-50%,-50%) scale(1)";
setTimeout(()=>m.style.transform="translate(-50%,-50%) scale(0)",1500);
}

function particulas(){
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.setProperty("--x",(Math.random()*500-250)+"px");
p.style.setProperty("--y",(Math.random()*500-250)+"px");
p.style.left="50%";
p.style.top="50%";
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);
}
}

function tremer(){
document.body.style.animation="tremer 0.3s";
setTimeout(()=>document.body.style.animation="",300);
}

/* 🧠 quase ganhou */
function quase(g){
if(Math.random()<0.3){
g[0][0]=g[0][1];
}
return g;
}

function girar(){

if(girando) return;
girando=true;

let aposta=parseFloat(document.getElementById("aposta").value);

/* 🎰 animação */
Promise.all([
girarColuna(0,1000),
girarColuna(1,1400),
girarColuna(2,1800)
]).then(()=>{

fetch("/api/slot",{
method:"POST",
body:new URLSearchParams({aposta})
})
.then(r=>r.json())
.then(d=>{

d.grade=quase(d.grade);

let g=d.grade.flat();

for(let i=0;i<9;i++){
document.getElementById("c"+i).src="/static/slot/"+g[i]+".jpeg";
}

if(d.ganho>0){

animarGanho(d.ganho);

if(d.ganho>=aposta*10){
fogo(); mega(); particulas(); tremer();
}else if(d.ganho>=aposta*5){
fogo(); particulas();
}

}else{
document.getElementById("resultado").innerHTML="Boa sorte!";
}

girando=false;

});

});

}

</script>

</body>
</html>
