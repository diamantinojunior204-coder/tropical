<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot Cassino</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("/static/fundo.jpg");
background-size:cover;
color:white;
text-align:center;
}

/* topo */

.topo{
padding:10px;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:space-between;
}

#saldo{
font-weight:bold;
color:gold;
}

/* máquina */

.slot{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:10px;
justify-content:center;
}

.celula{
width:100px;
height:100px;
background:black;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
border:3px solid gold;
}

.celula img{
width:80px;
}

/* botões */

.controls{
margin-top:20px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:orange;
cursor:pointer;
}

button:hover{
background:gold;
}

input{
padding:10px;
width:120px;
}

/* vitória */

.win{
animation:piscar 0.5s infinite;
}

@keyframes piscar{
0%{box-shadow:0 0 10px gold;}
50%{box-shadow:0 0 25px orange;}
100%{box-shadow:0 0 10px gold;}
}

</style>
</head>

<body>

<div class="topo">

<div>
Saldo: <span id="saldo">R$ {{saldo}}</span>
</div>

<div>
Jackpot: 💎 <span id="jackpot">100</span>
</div>

</div>

<h1>🎰 Caça-Níquel</h1>

<!-- SLOT -->

<div class="slot">

<div class="celula"><img id="c0" src="/static/slot/1.jpeg"></div>
<div class="celula"><img id="c1" src="/static/slot/2.jpeg"></div>
<div class="celula"><img id="c2" src="/static/slot/3.jpeg"></div>

<div class="celula"><img id="c3" src="/static/slot/4.jpeg"></div>
<div class="celula"><img id="c4" src="/static/slot/5.jpeg"></div>
<div class="celula"><img id="c5" src="/static/slot/1.jpeg"></div>

<div class="celula"><img id="c6" src="/static/slot/2.jpeg"></div>
<div class="celula"><img id="c7" src="/static/slot/3.jpeg"></div>
<div class="celula"><img id="c8" src="/static/slot/4.jpeg"></div>

</div>

<!-- controles -->

<div class="controls">

<input id="aposta" type="number" value="10">

<button onclick="girar()">🎰 GIRAR</button>

<button onclick="musica()">🎵 Música</button>

</div>

<div id="resultado"></div>

<audio id="som" loop>
<source src="/static/music/cassino.mp3">
</audio>

<script>

let music = false

function musica(){

let s = document.getElementById("som")

if(!music){
s.play()
music=true
}else{
s.pause()
music=false
}

}

function girar(){

let aposta = document.getElementById("aposta").value

fetch("/api/slot",{
method:"POST",
body:new URLSearchParams({
aposta:aposta
})
})
.then(r=>r.json())
.then(data=>{

if(data.error){
alert("Saldo insuficiente")
return
}

document.getElementById("saldo").innerText="R$ "+data.saldo
document.getElementById("jackpot").innerText=data.jackpot

let rolos=data.rolos

document.getElementById("c3").src="/static/slot/"+rolos[0]+".png"
document.getElementById("c4").src="/static/slot/"+rolos[1]+".png"
document.getElementById("c5").src="/static/slot/"+rolos[2]+".png"

let res=document.getElementById("resultado")

if(data.ganho>0){

res.innerHTML="🎉 GANHOU R$ "+data.ganho

document.querySelectorAll(".celula").forEach(c=>{
c.classList.add("win")
})

setTimeout(()=>{
document.querySelectorAll(".celula").forEach(c=>{
c.classList.remove("win")
})
},2000)

}else{

res.innerHTML="❌ Perdeu"

}

})

}

</script>

</body>
</html>
