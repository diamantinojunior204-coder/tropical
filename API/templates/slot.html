<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎃 Slot Halloween</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #2b0033, #000);
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 15px;
    color: orange;
    text-shadow: 0 0 10px red;
}

#saldoBox {
    font-size: 18px;
    margin: 10px;
}

.slot {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 90%;
    max-width: 320px;
    margin: 20px auto;
}

.card {
    background: #111;
    border-radius: 14px;
    border: 3px solid orange;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px orange;
}

.card.spin {
    animation: spin 0.15s infinite linear;
}

@keyframes spin {
    from { transform: rotateX(0deg); }
    to { transform: rotateX(360deg); }
}

.card img {
    width: 70%;
    height: 70%;
}

.controls {
    margin: 15px;
}

input {
    width: 120px;
    padding: 10px;
    font-size: 16px;
    text-align: center;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 14px 40px;
    font-size: 20px;
    background: orange;
    border: none;
    border-radius: 12px;
    box-shadow: 0 0 10px red;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

#resultado {
    margin-top: 15px;
    font-size: 20px;
    min-height: 28px;
}

#jackpot {
    margin-top: 5px;
    color: gold;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🎃 Slot Halloween</h1>

<div id="saldoBox">
    💰 Saldo: R$ <span id="saldo">{{ saldo }}</span>
</div>

<!-- 🎰 MATRIZ 3x3 -->
<div class="slot" id="slot">
    {% for i in range(9) %}
    <div class="card">
        <img src="/static/img/back.jpeg">
    </div>
    {% endfor %}
</div>

<div class="controls">
    <input type="number" id="aposta" placeholder="Aposta">
    <br>
    <button onclick="girar()">🎰 GIRAR</button>
</div>

<div id="resultado"></div>
<div id="jackpot"></div>

<!-- 🎵 SOM -->
<audio id="som" src="/static/audio/slot.mpeg" preload="auto"></audio>

<script>
const cards = document.querySelectorAll(".card");
const som = document.getElementById("som");

const imagens = {
    "🎃": "/static/img/abobora.jpeg",
    "💀": "/static/img/caveira.jpeg",
    "🦇": "/static/img/morcego.jpeg",
    "🍬": "/static/img/doce.jpeg",
    "💎": "/static/img/diamante.jpeg",
    "🧙‍♀️": "/static/img/bruxa.jpeg"
};

function girar() {
    const aposta = document.getElementById("aposta").value;
    const resultado = document.getElementById("resultado");
    const jackpot = document.getElementById("jackpot");

    resultado.textContent = "";
    jackpot.textContent = "";

    if (!aposta || aposta <= 0) {
        resultado.textContent = "⚠️ Aposta inválida";
        resultado.style.color = "orange";
        return;
    }

    cards.forEach(c => c.classList.add("spin"));
    som.currentTime = 0;
    som.play();

    setTimeout(() => {
        fetch("/api/slot", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "aposta=" + aposta
        })
        .then(r => r.json())
        .then(d => {
            cards.forEach(c => c.classList.remove("spin"));

            if (d.error) {
                resultado.textContent = "❌ Saldo insuficiente";
                resultado.style.color = "#ff4444";
                return;
            }

            // Preenche 3x3 usando os 3 rolos
            for (let i = 0; i < 9; i++) {
                const s = d.rolos[i % d.rolos.length];
                cards[i].innerHTML = `<img src="${imagens[s]}">`;
            }

            document.getElementById("saldo").textContent = d.saldo;

            if (d.ganho > 0) {
                resultado.textContent = "🎉 Ganhou R$ " + d.ganho;
                resultado.style.color = "#00ff99";
            } else {
                resultado.textContent = "💀 Perdeu";
                resultado.style.color = "#ff4444";
            }

            jackpot.textContent = "💰 Jackpot: R$ " + d.jackpot;
        });
    }, 1200);
}
</script>

</body>
</html>
