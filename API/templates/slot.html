<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot Cassino INSANO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("/static/fundo.jpg");
  background-size:cover;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

.topo{
  padding:10px 20px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
}

#usuario{font-size:18px;color:#00eaff;}
#saldo{font-weight:bold;color:gold;font-size:24px;}

#jackpot{
  font-weight:bold;
  color:#ffd700;
  font-size:26px;
  text-shadow:0 0 10px gold,0 0 30px orange;
  animation:jackpotGlow 1s infinite alternate;
}

@keyframes jackpotGlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.08); }
}

.slot{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(3,100px);
  grid-gap:10px;
  justify-content:center;
}

.celula{
  width:100px;
  height:100px;
  background:black;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid gold;
  transition:0.2s;
}

.celula img{width:80px;}

.controls{margin-top:20px;}

button{
  padding:14px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:orange;
  cursor:pointer;
}

button:hover{background:gold;}

button:disabled{
  opacity:0.5;
}

input{
  padding:10px;
  width:120px;
  font-size:16px;
}

/* 💥 brilho absurdo */
.win{
  animation:piscar 0.3s infinite;
}

@keyframes piscar{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 40px orange, 0 0 60px red;}
  100%{box-shadow:0 0 10px gold;}
}

#resultado{
  margin-top:15px;
  font-size:24px;
  font-weight:bold;
}

/* 🔥 FOGO */
#fireWin{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:0%;
  pointer-events:none;
  z-index:999;
  background:linear-gradient(to top,
    rgba(255,80,0,0.9),
    rgba(255,140,0,0.7),
    rgba(255,200,0,0.4),
    transparent
  );
  opacity:0;
}

@keyframes subirFogo{
  0%{height:0%;opacity:0;}
  30%{height:60%;opacity:1;}
  60%{height:100%;opacity:1;}
  100%{height:0%;opacity:0;}
}

/* 💥 TEXTO MEGA WIN */
#megaWin{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:60px;
  color:gold;
  text-shadow:0 0 20px orange,0 0 40px red;
  z-index:1000;
  pointer-events:none;
}

@keyframes aparecerWin{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.3);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* 🎇 partículas */
.particle{
  position:fixed;
  width:8px;
  height:8px;
  background:gold;
  border-radius:50%;
  z-index:999;
  animation:explodir 1s linear forwards;
}

@keyframes explodir{
  to{
    transform:translate(var(--x), var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="/static/audio/jogo2.mp3" type="audio/mpeg">
</audio>

<div class="topo">
<div id="usuario">👤 Boa sorte, {{ session.username }}</div>

<div>
💰 Saldo: <span id="saldo">R$ {{saldo}}</span>
</div>

<div>
💎 Jackpot: <span id="jackpot">{{jackpot}}</span>
</div>
</div>

<h1>🎰 Caça-Níquel INSANO</h1>

<div class="slot">
<div class="celula"><img id="c0" src="/static/slot/1.jpeg"></div>
<div class="celula"><img id="c1" src="/static/slot/2.jpeg"></div>
<div class="celula"><img id="c2" src="/static/slot/3.jpeg"></div>
<div class="celula"><img id="c3" src="/static/slot/4.jpeg"></div>
<div class="celula"><img id="c4" src="/static/slot/5.jpeg"></div>
<div class="celula"><img id="c5" src="/static/slot/1.jpeg"></div>
<div class="celula"><img id="c6" src="/static/slot/2.jpeg"></div>
<div class="celula"><img id="c7" src="/static/slot/3.jpeg"></div>
<div class="celula"><img id="c8" src="/static/slot/4.jpeg"></div>
</div>

<div class="controls">
<input id="aposta" type="number" value="10" min="1">
<button id="btnGirar" onclick="girar()">🎰 GIRAR</button>
</div>

<div id="resultado"></div>

<!-- 🔥 efeitos -->
<div id="fireWin"></div>
<div id="megaWin">💥 MEGA WIN 💥</div>

<audio id="somGiro" src="/static/audio2.mp3"></audio>
<audio id="somWin" src="/static/win.mp3"></audio>

<script>

let girando = false;

function animarSaldo(valorFinal){
let el=document.getElementById("saldo");
let atual=parseFloat(el.innerText.replace("R$","")) || 0;

let i=setInterval(()=>{
atual+=(valorFinal-atual)*0.2;
el.innerText="R$ "+atual.toFixed(2);

if(Math.abs(valorFinal-atual)<0.05){
el.innerText="R$ "+valorFinal.toFixed(2);
clearInterval(i);
}
},30);
}

/* 🔥 efeitos */
function efeitoFogo(){
let fogo=document.getElementById("fireWin");
fogo.style.animation="subirFogo 2s ease-out";
setTimeout(()=>{fogo.style.animation="";},2000);
}

function megaWin(){
let el=document.getElementById("megaWin");
el.style.animation="aparecerWin 0.6s ease";
el.style.transform="translate(-50%,-50%) scale(1)";

setTimeout(()=>{
el.style.transform="translate(-50%,-50%) scale(0)";
},1500);
}

/* 🎇 partículas */
function particulas(){
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";

let x=(Math.random()*600-300)+"px";
let y=(Math.random()*600-300)+"px";

p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

p.style.left="50%";
p.style.top="50%";

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);
}
}

function vibrar(){
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}
}

function girar(){

if(girando) return;

let aposta=parseFloat(document.getElementById("aposta").value);

if(isNaN(aposta) || aposta<=0){
alert("Digite uma aposta válida!");
return;
}

girando = true;
document.getElementById("btnGirar").disabled = true;

document.getElementById("somGiro").play();

let tempo=0;

let spin=setInterval(()=>{

for(let i=0;i<9;i++){
let r=Math.floor(Math.random()*6)+1;
document.getElementById("c"+i).src="/static/slot/"+r+".jpeg";
}

tempo+=100;

if(tempo>=2000){
clearInterval(spin);
mostrarResultado();
}

},100);

function mostrarResultado(){

fetch("/api/slot",{
method:"POST",
body:new URLSearchParams({aposta:aposta})
})
.then(r=>r.json())
.then(data=>{

if(data.erro){
alert(data.erro);
liberar();
return;
}

animarSaldo(data.saldo);
document.getElementById("jackpot").innerText=data.jackpot;

let grade=data.grade.flat();

for(let i=0;i<9;i++){
let el=document.getElementById("c"+i);
el.src="/static/slot/"+grade[i]+".jpeg";
el.classList.remove("win");
}

if(data.linhas_ganhas){
data.linhas_ganhas.forEach(linha=>{
linha.forEach(idx=>{
document.getElementById("c"+idx).classList.add("win");
});
});
}

let res=document.getElementById("resultado");

if(data.ganho>0){

document.getElementById("somWin").play();
res.innerHTML="🎉 GANHOU R$ "+data.ganho;

/* 🔥 níveis de ganho */
if(data.ganho >= aposta * 10){
efeitoFogo();
megaWin();
particulas();
vibrar();
}else if(data.ganho >= aposta * 5){
efeitoFogo();
particulas();
}

}else{
res.innerHTML="Boa sorte!";
}

liberar();

})
.catch(()=>{
alert("Erro ao processar o slot");
liberar();
});

}

function liberar(){
girando = false;
document.getElementById("btnGirar").disabled = false;
}

}

</script>

</body>
</html>
