<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot Real</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* topo */
.topo{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#000;
}

/* SLOT */
.slot{
  display:flex;
  justify-content:center;
  margin-top:40px;
  gap:10px;
}

/* coluna (reel) */
.reel{
  width:100px;
  height:300px;
  overflow:hidden;
  border:3px solid gold;
  border-radius:10px;
  background:black;
  position:relative;
}

/* faixa que se move */
.reel-track{
  position:absolute;
  width:100%;
  top:0;
}

/* símbolos */
.symbol{
  width:100px;
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.symbol img{
  width:80px;
}

/* botão */
button{
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  background:orange;
  border:none;
  border-radius:10px;
}

/* efeitos */
.win{
  box-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div class="topo">
<div>💰 <span id="saldo">R$ 1000</span></div>
<div>💎 <span id="jackpot">5000</span></div>
</div>

<h1>🎰 SLOT REAL</h1>

<div class="slot">

<div class="reel"><div class="reel-track" id="r0"></div></div>
<div class="reel"><div class="reel-track" id="r1"></div></div>
<div class="reel"><div class="reel-track" id="r2"></div></div>

</div>

<input id="aposta" type="number" value="10">
<br>
<button onclick="girar()">🎰 GIRAR</button>

<div id="resultado"></div>

<script>

let simbolos = [1,2,3,4,5,6];

function criarReel(id){
  let reel = document.getElementById(id);
  reel.innerHTML="";

  // cria vários símbolos (loop infinito fake)
  for(let i=0;i<20;i++){
    let s = simbolos[Math.floor(Math.random()*simbolos.length)];
    let div = document.createElement("div");
    div.className="symbol";
    div.innerHTML = `<img src="/static/slot/${s}.jpeg">`;
    reel.appendChild(div);
  }
}

// inicializa
criarReel("r0");
criarReel("r1");
criarReel("r2");

/* 🎰 girar */
function girar(){

let aposta = parseFloat(document.getElementById("aposta").value);

Promise.all([
  girarReel("r0", 1500),
  girarReel("r1", 2000),
  girarReel("r2", 2500)
]).then(()=>{
  resultadoFinal(aposta);
});

}

/* 🎰 animação real */
function girarReel(id, tempo){

return new Promise(resolve=>{

  let reel = document.getElementById(id);

  let pos = 0;
  let speed = 50;

  let intervalo = setInterval(()=>{
    pos += speed;
    reel.style.transform = `translateY(-${pos}px)`;
  },16);

  setTimeout(()=>{
    clearInterval(intervalo);

    // posição final alinhada (multiplo de 100)
    let final = Math.floor(pos/100)*100;
    reel.style.transform = `translateY(-${final}px)`;

    resolve();
  },tempo);

});

}

/* 🎯 resultado */
function resultadoFinal(aposta){

fetch("/api/slot",{
  method:"POST",
  body:new URLSearchParams({aposta})
})
.then(r=>r.json())
.then(data=>{

let grade = data.grade;

/* aplica resultado visual REAL */
for(let col=0;col<3;col++){

  let reel = document.getElementById("r"+col);

  reel.innerHTML="";

  for(let i=0;i<10;i++){
    let s = grade[i%3][col];
    let div = document.createElement("div");
    div.className="symbol";
    div.innerHTML=`<img src="/static/slot/${s}.jpeg">`;
    reel.appendChild(div);
  }

}

/* ganho */
let res = document.getElementById("resultado");

if(data.ganho>0){
  res.innerHTML = "🎉 GANHOU R$ "+data.ganho;
}else{
  res.innerHTML = "Boa sorte!";
}

});

}

</script>

</body>
</html>
