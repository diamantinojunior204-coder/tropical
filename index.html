<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diamante...</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}
.box {
    text-align: center;
    max-width: 320px;
}

.box img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

.loader {
    border: 4px solid #1e293b;
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    margin: 20px auto;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    100% { transform: rotate(360deg); }
}
small {
    color: #94a3b8;
}
</style>
</head>
<body>

<div class="box">

    <img id="slide" src="img1.jpg">

    <h2>⏳ Aguarde um instante</h2>
    <p>Jogo carregando...</p>
    <div class="loader"></div>
    <small>Isso pode levar até 30 segundos</small>
</div>

<script>

const imagens = [
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg"   
];

let index = 0;

setInterval(()=>{
    index++;
    if(index >= imagens.length){
        index = 0;
    }
    document.getElementById("slide").src = imagens[index];
},2000);


const RENDER_URL = "https://tropical-5q68.onrender.com";

async function checkServer() {
    try {
        const res = await fetch(RENDER_URL, { mode: "no-cors" });
        window.location.href = RENDER_URL;
    } catch (e) {
        setTimeout(checkServer, 3000);
    }
}

checkServer();

</script>

</body>
</html>
