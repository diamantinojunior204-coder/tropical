<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carregando...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Arial', sans-serif;
}

body{
  height:100vh;
  background:
    radial-gradient(circle at top, #00ffd5, #003333 60%, #000);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  overflow:hidden;
}

/* CONTAINER */
.box{
  text-align:center;
  width:90%;
  max-width:360px;
}

/* VÍDEO NO LUGAR DO DIAMANTE */
.video-container{
  width:150px;
  height:150px;
  margin:0 auto 30px;
  border-radius:50%;
  overflow:hidden;
  box-shadow: 0 0 30px rgba(0,255,200,0.8);
  border: 3px solid #00ffd5;
}

.video-container video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXTO */
h1{
  font-size:22px;
  margin-bottom:10px;
  letter-spacing:1px;
}

p{
  font-size:14px;
  opacity:.85;
  margin-bottom:25px;
}

/* LOADING DOTS */
.loading{
  font-size:18px;
  letter-spacing:4px;
}

/* BOTÃO */
button{
  display:none;
  width:100%;
  padding:16px;
  margin-top:20px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg, #00ffd5, #00ff88);
  color:#000;
  font-weight:bold;
  cursor:pointer;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 25px rgba(0,255,180,0.9);
}

/* ANIMAÇÕES */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.07);}
  100%{transform:scale(1);}
}

/* PARTÍCULAS */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#00ffd5;
  border-radius:50%;
  animation: float 6s linear infinite;
  opacity:.6;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="box">
  
  <!-- VÍDEO NO LUGAR DO DIAMANTE -->
  <div class="video-container">
    <video autoplay loop muted playsinline>
      <source src="diamante.mp4" type="video/mp4">
    </video>
  </div>

  <h1>Diamante Tropical</h1>
  <p>Carregando o servidor<br>Prepare-se para jogar</p>

  <div class="loading" id="dots">● ● ●</div>

  <button id="btn" onclick="entrar()">JOGAR AGORA</button>
</div>

<script>
/* EFEITO DOS PONTOS */
let dots = document.getElementById("dots");
let count = 0;

setInterval(()=>{
  count = (count+1)%4;
  dots.innerText = "● ".repeat(count || 3);
},500);

/* MOSTRA BOTÃO */
setTimeout(()=>{
  dots.style.display="none";
  document.getElementById("btn").style.display="block";
},4500);

/* REDIRECIONA */
function entrar(){
  window.location.href = "https://tropical-5q68.onrender.com/";
}

/* PARTÍCULAS */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=4+Math.random()*6+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
