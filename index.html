<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aguarde | Carregando</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("fundo.jpg") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 380px;
      padding: 25px;
      border-radius: 16px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    .logo {
      width: 140px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00ffcc, #00bfa6);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0,255,204,0.6);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,204,0.9);
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="Diamantino.jpg" alt="Logo" class="logo">

    <h1>Aplicação iniciando</h1>
    <p>Estamos preparando a diversão para você!.<br>Aguarde alguns segundos.</p>

    <button onclick="entrar()">JOGAR AGORA</button>

    <div class="status" id="status">
      Pronto para entrar
    </div>
  </div>

  <script>
    function entrar() {
      document.getElementById("status").innerText = "Entrando...";
      window.location.href = "https://SEU-APP.onrender.com";
    }
  </script>

</body>
</html>
